name: ow-libc

on:
  push:
    paths:
      - 'libc/**'
      - '.github/workflows/ow-libc.yml'
  pull_request:
    paths:
      - 'libc/**'
      - '.github/workflows/ow-libc.yml'

jobs:
  build:
    name: OW LIBC build
    runs-on: ${{ matrix.runner }}
    env: 
      TOPDIR: ${{env:GITHUB_WORKSPACE}}
    strategy:
      matrix:
        include:
        - runner: ubuntu-latest
          arch: x64
        - runner: macos-13
          arch: x64
        - runner: macos-14
          arch: arm64

    steps:
      - name: checkout ELKS
        uses: actions/checkout@v4
      - name: Open Watcom setup
        uses: open-watcom/setup-watcom@v0
        with:
          version: "2.0-64"
      - name: LIBC build ${{ matrix.runner }}-${{ matrix.arch }}
        working-directory: libc
        run: |
          make -f watcom.mk clean
          make -f watcom.mk
      - name: build smples
        working-directory: ${env:GITHUB_WORKSPACE}/elkscmd/basic
        run: |
          ${env:GITHUB_WORKSPACE}/elks/tools/objtools/ewcc basic.c
          ${env:GITHUB_WORKSPACE}/elks/tools/objtools/ewcc host.c
          ${env:GITHUB_WORKSPACE}/elks/tools/objtools/ewcc host-stubs.c
          ${env:GITHUB_WORKSPACE}/elks/tools/objtools/ewlink basic.obj host.obj host-stubs.obj
          cp basic.os2 ${env:GITHUB_WORKSPACE}/elkscmd/rootfs_template/root

